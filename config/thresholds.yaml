general:
  yolo_model: "../models/yolov8n-pose.pt"
  frame_skip: 1
  person_conf: 0.30
  detector_url: "http://127.0.0.1:9000"

fall:
  bbox_ratio_thresh: 1.3
  spine_angle_thresh: 55.0
  critical_seconds: 30.0
  danger_min_seconds: 3.0
  danger_max_seconds: 120.0
  temporal_window: 10
  temporal_threshold: 0.40
  cooldown_seconds: 120
  confirm_seconds: 4.0      # ลดจาก 9.0 — alert เร็วขึ้นหลังนอนบนพื้น  
  warning_seconds: 2.0      # ใช้กับ fallback is_down ที่เพิ่มใหม่
  # velocity/history tuning (pixels/sec, seconds)
  history_len: 16
  # normalized thresholds: fractions of image height per second
  spike_thresh_norm: 0.18
  motion_thresh_norm: 0.02
  sustain_seconds: 1.0
  lying_angle_thresh: 40.0
  # geometry fallback: catches clear lying posture even when keypoint jitter prevents low-motion confirmation
  geometry_ratio_thresh: 1.8
  geometry_angle_thresh: 25.0
  geometry_confirm_seconds: 3.0
  danger_lying_seconds: 15.0
  recover_seconds: 5.0

streaming:
  fps: 10                 # sampling fps for lightweight trigger (used for VLC transcode)
  rolling_window: 90      # max number of raw frames to keep per source (for context)
  confirmation_window: 30 # seconds to hold a trigger before confirming
  trigger_angle_delta: 30 # degrees change to flag sudden angle change (A)
  trigger_frames: 5       # frames to consider for short-window triggers
  lying_angle_thresh: 45  # torso angle to consider 'down-ish' for trigger (degrees)

fall_warning:
  temporal_window: 10
  temporal_threshold: 0.35
  cooldown_seconds: 5

pose_sos:
  raise_margin_px: 25
  temporal_window: 10
  temporal_threshold: 0.40
  cooldown_seconds: 10

hand_sos:
  min_detection_confidence: 0.60
  min_tracking_confidence: 0.40
  temporal_window: 10
  temporal_threshold: 0.40
  cooldown_seconds: 60
  # additional filters for per-track hand-sos association
  min_hand_bbox_area_norm: 0.002   # hand bbox area normalized by image area (default ~0.2% of frame)
  min_kp_conf: 0.4                 # min keypoint confidence to trust landmarks

# Danger assessment matrix & flags
danger:
  # post-fall timing
  immobile_seconds: 5          # immobile >5s considered immobile
  extended_inactivity_seconds: 30
  # record threshold: only record alerts with level >= this (0=LOG,1=MED,2=HIGH,3=CRITICAL)
  record_threshold_level: 2
  # environment modifiers (add levels)
  environment_modifier:
    outdoor_road_work: 1
    elderly_child: 1

  flags:
    - CARDIAC_SIGNAL
    - HEATSTROKE_RISK
    - SEIZURE_PATTERN
    - SYNCOPE_PATTERN
    - STROKE_ASYMMETRY
    - INTOXICATION_PATTERN
    - ROAD_ENVIRONMENT
    - OUTDOOR_HEAT_RISK
    - WORKPLACE_HAZARD
    - ALONE_NO_HELP
    - PRONE_POSITION
    - EXTENDED_INACTIVITY
    - NO_PROTECTIVE_REFLEX

# Record only dangerous alerts (levels >= record_threshold_level)
record_only_dangerous: false
